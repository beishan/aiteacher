# ============================================================
# TutorAssist NAS 生产环境 Docker Compose 配置
# 使用方式: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tutor_assist}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-memoryvault}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NAS 资源限制（根据实际 NAS 配置调整）
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: tutor-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-memoryvault} --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-memoryvault}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: tutor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-memoryvault}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # 后端服务
  backend:
    image: tutor-assist-backend:latest
    # 如果没有本地镜像，取消下面注释使用构建方式：
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: tutor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tutor_assist}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-memoryvault}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-memoryvault}
      JWT_SECRET: ${JWT_SECRET:-tutor-assist-secret-key-must-be-at-least-256-bits-long-for-hs256}
      MINIO_HOST: minio
      MINIO_API_PORT: 9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-memoryvault}
      ONLYOFFICE_URL: http://onlyoffice:80
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:-http://localhost:8081}
      ONLYOFFICE_JWT_SECRET: ${JWT_SECRET:-tutor-assist-secret-key-must-be-at-least-256-bits-long-for-hs256}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      # JVM 内存限制（NAS 资源有限）
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          memory: 768M

  # OnlyOffice 文档编辑服务（可选，如果 NAS 资源紧张可注释掉）
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: tutor-onlyoffice
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-tutor-assist-secret-key-must-be-at-least-256-bits-long-for-hs256}
      - JWT_ENABLED=true
    ports:
      - "${ONLYOFFICE_PORT:-8081}:80"
    deploy:
      resources:
        limits:
          memory: 1G

  # 前端服务
  frontend:
    image: tutor-assist-frontend:latest
    # 如果没有本地镜像，取消下面注释使用构建方式：
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: tutor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  minio_data:
